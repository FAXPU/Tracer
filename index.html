<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracer - Premium Task Architecture</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="header-top">
        <div class="logo-area">
          <h1>Tracer</h1>
          <span class="version-tag">v2.0</span>
        </div>
        <button id="theme-toggle" aria-label="Toggle Theme">🌙</button>
      </div>
      <p class="subtitle">Trace your productivity across any device.</p>
    </header>
    <main>
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="🔍 Search tasks..." autocomplete="off">
      </div>
      <form id="todo-form">
        <input type="text" id="task-input" placeholder="What needs to be done?" required autocomplete="off">

        <div class="select-wrapper">
          <select id="priority-input" aria-label="Task Priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <button type="submit" id="add-btn">Add Task</button>
      </form>
      <div class="toolbar">
        <span id="task-count">0 tasks left</span>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button id="clear-completed-btn">Clear Completed</button>
      </div>
      <div class="list-wrapper">
        <ul id="task-list"></ul>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
