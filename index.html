<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracer - Task Management</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Tracer</h1>
      <p class="subtitle">Trace your productivity across any device.</p>
    </header>

    <main>
      <form id="todo-form">
        <input type="text" id="task-input" placeholder="What needs to be done?" required autocomplete="off">
        <button type="submit" id="add-btn">Add Task</button>
      </form>

      <ul id="task-list">
        </ul>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
